<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IssaraStudio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--surface3:#e8e7e0;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.15);--text:#1a1a18;--muted:#7a7a72;--faint:#b0afa8;--ink:#2c2c28;--orange:#e85d26;--orange-lt:#fdf0ea;--green:#2a7d4f;--green-lt:#e8f5ee;--blue:#2563b0;--blue-lt:#e8f0fb;--amber:#b86e00;--amber-lt:#fef3e2;--red:#c0392b;--red-lt:#fdecea;--purple:#6d3fa0;--purple-lt:#f2ecfb;--r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;--shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px;line-height:1.5}
.sidebar{width:220px;flex-shrink:0;background:var(--ink);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform .3s}
.logo{padding:1.4rem 1.25rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--orange);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;flex-shrink:0}
.logo-name{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#fff;letter-spacing:.02em}
.logo-name span{color:var(--orange)}
.nav-section{padding:1rem .75rem .5rem;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;margin:1px 8px;border-radius:var(--r-md);font-size:13.5px;color:rgba(255,255,255,.55);cursor:pointer;transition:all .15s;background:transparent;border:none;width:calc(100% - 16px);text-align:left;font-family:'IBM Plex Sans Thai',sans-serif}
.nav-btn i{font-size:17px;flex-shrink:0}
.nav-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-btn.active{background:var(--orange);color:#fff}
.sidebar-bottom{margin-top:auto;padding:1rem;border-top:1px solid rgba(255,255,255,.08)}
.staff-chip{display:flex;align-items:center;gap:9px}
.staff-avatar{width:32px;height:32px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
.staff-name{font-size:13px;color:#fff;font-weight:500}
.staff-role{font-size:11px;color:rgba(255,255,255,.45)}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.9rem 1.75rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600}
.topbar-sub{font-size:12px;color:var(--muted);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.tb-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r-md);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'IBM Plex Sans Thai',sans-serif;transition:all .15s}
.tb-btn:hover{border-color:var(--border2);background:var(--surface2)}
.tb-btn.primary{background:var(--orange);color:#fff;border-color:var(--orange)}
.tb-btn.primary:hover{background:#d14d1a;border-color:#d14d1a}
.tb-btn i{font-size:16px}
.hamburger-btn{display:none}
.content{padding:1.5rem 1.75rem}
.page{display:none}.page.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.25rem 1.4rem;box-shadow:var(--shadow)}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.card-title{font-size:13px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.05em}
.card-title i{font-size:15px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:1.25rem}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.1rem 1.3rem;position:relative;overflow:hidden;transition:box-shadow .2s;box-shadow:var(--shadow)}
.kpi:hover{box-shadow:var(--shadow-md)}
.kpi-accent{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.kpi-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.kpi-val{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--text);line-height:1}
.kpi-unit{font-size:13px;font-weight:400;color:var(--muted)}
